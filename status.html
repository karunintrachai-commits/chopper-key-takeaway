<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Key Takeaway — Status</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Key Takeaway">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1e3a6e">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Theme: Finance Pro (default) ─────────────────────────────────────────── */
:root{
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#f4f6fb;--surface3:#e6eaf4;
  --border:#c8d0e2;--text:#152244;--muted:#5a6b8c;
  --accent:#b07030;--accent-light:#faf3e8;--accent-dark:#7a4e20;
  --badge-bg:#1e3a6e;--badge-text:#ffffff;
  --green:#15803d;--amber:#b45309;--red:#c0392b;
  --radius:14px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
[data-theme="sunrise"]{
  --bg:#fff7ed;--surface:#ffffff;--surface2:#ffedd5;--surface3:#fed7aa;
  --border:#fdba74;--text:#1c1510;--muted:#9a6a50;
  --accent:#ea580c;--accent-light:#ffedd5;--accent-dark:#c2410c;
  --badge-bg:#ea580c;--badge-text:#fff;
}
[data-theme="dark"]{
  --bg:#18120a;--surface:#241b0e;--surface2:#1e1508;--surface3:#2e2210;
  --border:#3d2e15;--text:#fef3c7;--muted:#a08c6a;
  --accent:#f59e0b;--accent-light:#2e2210;--accent-dark:#fcd34d;
  --badge-bg:#f59e0b;--badge-text:#18120a;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;
}

body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
  line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}

/* ── Header ───────────────────────────────────────────────────────────────── */
.hdr{padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;
  padding-top:max(14px,env(safe-area-inset-top));}
.hdr-icon{width:40px;height:40px;min-width:40px;border-radius:12px;overflow:hidden;}
.hdr-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.hdr-title{font-size:16px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.theme-switcher{display:flex;gap:4px;align-items:center;}
.theme-btn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;
  transition:transform .15s;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
.theme-btn:hover{transform:scale(1.2);}
.theme-btn.active{transform:scale(1.15);}
.theme-btn[data-t="sunrise"]{background:linear-gradient(135deg,#fdba74,#ea580c);}
.theme-btn[data-t="dark"]   {background:linear-gradient(135deg,#4a4a4a,#1a1a1a);}
.theme-btn[data-t="finance"]{background:linear-gradient(135deg,#1e3a6e,#b07030);}
.link-btn{font-size:12px;font-weight:600;color:var(--accent-dark);background:var(--accent-light);
  border:1px solid var(--border);border-radius:20px;padding:5px 12px;text-decoration:none;
  white-space:nowrap;-webkit-tap-highlight-color:transparent;}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.wrap{max-width:820px;margin:0 auto;padding:16px 16px 48px;}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin:26px 0 10px;}
.section-title:first-child{margin-top:6px;}
.section-title span{color:var(--accent-dark);}

/* ── Hero ─────────────────────────────────────────────────────────────────── */
.hero{background:linear-gradient(135deg,var(--badge-bg),var(--accent-dark));
  color:#fff;border-radius:var(--radius);padding:22px 22px;display:flex;align-items:center;
  gap:18px;flex-wrap:wrap;box-shadow:0 6px 24px rgba(21,34,68,.16);}
.hero-main{flex:1;min-width:180px;}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  opacity:.8;margin-bottom:4px;}
.hero-date{font-size:30px;font-weight:800;line-height:1.1;letter-spacing:-.5px;}
.hero-sub{font-size:13px;opacity:.85;margin-top:6px;}
.fresh-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
  padding:8px 15px;border-radius:24px;background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.28);}
.fresh-dot{width:9px;height:9px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 4px rgba(74,222,128,.25);}
.fresh-dot.warn{background:#fbbf24;box-shadow:0 0 0 4px rgba(251,191,36,.25);}
.fresh-dot.stale{background:#f87171;box-shadow:0 0 0 4px rgba(248,113,113,.25);}

/* ── Stat tiles ───────────────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
.stat-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px;}
.stat-lbl{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:500;}
.stat-mkts{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.mkt-pill{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);}

/* ── Latest batch ─────────────────────────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.batch-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.batch-row:last-child{border-bottom:none;}
.b-ticker{font-size:13px;font-weight:700;color:var(--badge-text);background:var(--badge-bg);
  padding:3px 10px;border-radius:6px;min-width:62px;text-align:center;letter-spacing:.02em;}
.b-broker{font-size:13px;font-weight:600;color:var(--text);}
.b-mkt{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--surface3);
  padding:2px 9px;border-radius:20px;margin-left:auto;}
.b-preview{flex-basis:100%;font-size:12px;color:var(--muted);line-height:1.55;padding-left:72px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── Timeline ─────────────────────────────────────────────────────────────── */
.tl-row{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.tl-date{min-width:108px;flex-shrink:0;}
.tl-date-main{font-size:14px;font-weight:700;}
.tl-date-ago{font-size:11px;color:var(--muted);margin-top:2px;}
.tl-cnt{display:inline-block;font-size:10.5px;font-weight:700;color:var(--accent-dark);
  background:var(--accent-light);border:1px solid var(--border);border-radius:20px;padding:1px 8px;margin-top:5px;}
.tl-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;}
.tl-chip{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);white-space:nowrap;}
.tl-chip .c-brk{font-weight:500;color:var(--muted);margin-left:4px;font-size:10px;}
.tl-more{padding:12px 16px;text-align:center;}
.tl-more button{font-size:12px;font-weight:600;color:var(--accent-dark);background:none;
  border:1px dashed var(--border);border-radius:8px;padding:8px 18px;cursor:pointer;font-family:var(--font);
  -webkit-tap-highlight-color:transparent;}

/* ── No data ──────────────────────────────────────────────────────────────── */
#no-data{display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:50vh;text-align:center;padding:32px;}
#no-data h2{font-size:20px;margin-bottom:8px;}
#no-data p{color:var(--muted);font-size:14px;max-width:420px;line-height:1.7;}
code{background:var(--surface3);padding:1px 6px;border-radius:4px;font-size:12px;}

@media(max-width:600px){
  .hdr{padding:12px 14px;gap:10px;padding-top:max(12px,env(safe-area-inset-top));}
  .hero{padding:20px 18px;}
  .hero-date{font-size:26px;}
  .wrap{padding:14px 14px 44px;}
  .tl-date{min-width:96px;}
}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-icon"><img src="Chopper.jpeg" alt="Chopper"></div>
  <div>
    <div class="hdr-title">Status</div>
    <div class="hdr-sub">Chopper — Latest data status</div>
  </div>
  <div class="hdr-right">
    <div class="theme-switcher">
      <button class="theme-btn" data-t="sunrise" onclick="setTheme('sunrise',this)" title="Sunrise"></button>
      <button class="theme-btn" data-t="dark" onclick="setTheme('dark',this)" title="Dark Amber"></button>
      <button class="theme-btn active" data-t="finance" onclick="setTheme('finance',this)" title="Finance Pro"></button>
    </div>
    <a class="link-btn" href="index.html">All notes</a>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="hero" id="hero"></div>

  <div class="section-title">Coverage Overview</div>
  <div class="stats" id="stats"></div>

  <div class="section-title">Latest Batch <span id="batch-date-lbl"></span></div>
  <div class="panel" id="batch"></div>

  <div class="section-title">Timeline</div>
  <div class="panel" id="timeline"></div>
</div>

<div id="no-data">
  <h2>No data yet</h2>
  <p><code>keytakeaway_data.js</code> not found — run <code>push.bat</code> to sync + deploy first.</p>
</div>

<script src="keytakeaway_data.js" onerror="window._DATA_ERR=true"></script>
<script>
/* ── Theme ────────────────────────────────────────────────────────────────── */
function setTheme(t, btn){
  const el = document.documentElement;
  if (t === 'finance'){ delete el.dataset.theme; } else { el.dataset.theme = t; }
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b === btn));
  localStorage.setItem('kt-theme', t);
}
(function initTheme(){
  const saved = localStorage.getItem('kt-theme') || 'finance';
  const btn = document.querySelector(`.theme-btn[data-t="${saved}"]`);
  if (btn) setTheme(saved, btn);
})();

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
const MON_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseNoteDate(str){
  if (!str) return null;
  const m = str.trim().match(/(\d{1,2})\s+(\w+)\s+(\d{2,4})/);
  if (!m) return null;
  const mon = MONTHS[m[2].toLowerCase().slice(0,3)];
  if (mon === undefined) return null;
  const yr = m[3].length === 2 ? 2000 + (+m[3]) : (+m[3]);
  return new Date(yr, mon, +m[1]);
}
function fmtDate(d){ return `${d.getDate()} ${MON_ABBR[d.getMonth()]} ${d.getFullYear()}`; }
function dayKey(d){ return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dateStrFromLabel(label){ const m = label.match(/\d{1,2}\s+\w+\s+\d{2,4}/); return m ? m[0] : ''; }
function brokerFromLabel(label){ const b = label.replace(/\d{1,2}\s+\w+\s+\d{2,4}.*$/,'').trim(); return b || '—'; }
function cleanPreview(content){
  return content.replace(/\*\*Date:\*\*[^\n]*/g,'').replace(/\*\*Market:\*\*[^\n]*/g,'')
                .replace(/[*#`>]/g,'').replace(/\s+/g,' ').trim();
}
function daysAgo(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(d); t.setHours(0,0,0,0);
  return Math.round((today - t) / 86400000);
}
function agoText(n){ if (n <= 0) return 'Today'; if (n === 1) return 'Yesterday'; return `${n} days ago`; }

/* ── Build ────────────────────────────────────────────────────────────────── */
function collectEntries(){
  const entries = [];
  stockData.forEach(stock => {
    stock.takeaways.forEach(t => {
      const ds = dateStrFromLabel(t.label);
      entries.push({ ticker: stock.ticker, market: stock.market || 'Others',
        broker: brokerFromLabel(t.label), parsed: parseNoteDate(ds), preview: cleanPreview(t.content) });
    });
  });
  return entries;
}

let TL_LIMIT = 8, GROUPS = [];

function renderHero(latest){
  const n = daysAgo(latest.date);
  let cls = 'fresh-dot', word = 'Fresh';
  if (n > 7){ cls += ' stale'; word = 'Stale'; }
  else if (n > 3){ cls += ' warn'; word = 'Aging'; }
  document.getElementById('hero').innerHTML = `
    <div class="hero-main">
      <div class="hero-eyebrow">Latest Key Takeaway</div>
      <div class="hero-date">${fmtDate(latest.date)}</div>
      <div class="hero-sub">${latest.count} notes from ${latest.tickers} tickers</div>
    </div>
    <div class="fresh-badge"><span class="${cls}"></span>${word} · ${agoText(n)}</div>`;
}

function renderStats(entries){
  const tickers = new Set(stockData.map(s => s.ticker)).size;
  const notes = entries.length;
  const mktCount = {};
  stockData.forEach(s => { const m = s.market || 'Others'; mktCount[m] = (mktCount[m]||0)+1; });
  const order = (typeof MARKETS !== 'undefined' ? MARKETS : Object.keys(mktCount));
  const pills = order.filter(m => mktCount[m])
    .map(m => `<span class="mkt-pill">${esc(m)} ${mktCount[m]}</span>`).join('');
  const activeDays = new Set(entries.filter(e=>e.parsed).map(e=>dayKey(e.parsed))).size;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${tickers}</div><div class="stat-lbl">Total Tickers</div></div>
    <div class="stat"><div class="stat-val">${notes}</div><div class="stat-lbl">Total Notes</div></div>
    <div class="stat"><div class="stat-val">${activeDays}</div><div class="stat-lbl">Active Days</div></div>
    <div class="stat"><div class="stat-val">${Object.keys(mktCount).length}</div><div class="stat-lbl">Markets</div>
      <div class="stat-mkts">${pills}</div></div>`;
}

function renderBatch(g){
  document.getElementById('batch-date-lbl').textContent = `· ${fmtDate(g.date)}`;
  document.getElementById('batch').innerHTML = g.items
    .sort((a,b)=> a.ticker.localeCompare(b.ticker))
    .map(e => `
      <div class="batch-row">
        <span class="b-ticker">${esc(e.ticker)}</span>
        <span class="b-broker">${esc(e.broker)}</span>
        <span class="b-mkt">${esc(e.market)}</span>
        <div class="b-preview">${esc(e.preview.slice(0,220))}</div>
      </div>`).join('');
}

function renderTimeline(){
  const shown = GROUPS.slice(0, TL_LIMIT);
  let html = shown.map(g => {
    const chips = g.items.sort((a,b)=> a.ticker.localeCompare(b.ticker))
      .map(e => `<span class="tl-chip">${esc(e.ticker)}<span class="c-brk">${esc(e.broker)}</span></span>`).join('');
    return `
      <div class="tl-row">
        <div class="tl-date">
          <div class="tl-date-main">${fmtDate(g.date)}</div>
          <div class="tl-date-ago">${agoText(daysAgo(g.date))}</div>
          <span class="tl-cnt">${g.items.length} note${g.items.length>1?'s':''}</span>
        </div>
        <div class="tl-chips">${chips}</div>
      </div>`;
  }).join('');
  if (GROUPS.length > TL_LIMIT){
    html += `<div class="tl-more"><button onclick="TL_LIMIT+=8;renderTimeline()">
      Show more (${GROUPS.length - TL_LIMIT} days left)</button></div>`;
  }
  document.getElementById('timeline').innerHTML = html;
}

/* ── Mount ────────────────────────────────────────────────────────────────── */
(function mount(){
  if (window._DATA_ERR || typeof stockData === 'undefined' || !stockData.length){
    document.getElementById('wrap').style.display = 'none';
    document.getElementById('no-data').style.display = 'flex';
    return;
  }
  const entries = collectEntries();
  const map = new Map();
  entries.forEach(e => {
    if (!e.parsed) return;
    const k = dayKey(e.parsed);
    if (!map.has(k)) map.set(k, { date: e.parsed, items: [] });
    map.get(k).items.push(e);
  });
  GROUPS = [...map.values()].sort((a,b) => b.date - a.date);

  if (!GROUPS.length){
    document.getElementById('hero').innerHTML =
      '<div class="hero-main"><div class="hero-date">— No dates —</div></div>';
    renderStats(entries);
    return;
  }
  const g0 = GROUPS[0];
  renderHero({ date: g0.date, count: g0.items.length, tickers: new Set(g0.items.map(i=>i.ticker)).size });
  renderStats(entries);
  renderBatch(g0);
  renderTimeline();
})();
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
</html>
